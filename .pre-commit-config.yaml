# LOCAL developer hooks only. This repo has no native CI lint stage (its
# pipeline runs only the upstream renovate-runner job), so these hooks are the
# main fast-feedback gate for the JSON presets + the CI YAML. Run
# `pre-commit install` after cloning.
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: detect-private-key
      - id: mixed-line-ending
        args: ['--fix=lf']

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: ['feat', 'fix', 'docs', 'refactor', 'chore', 'test', 'ci', 'build']

  # Validate the Renovate presets — the authoritative correctness check.
  # Runs via npx so no local install is needed; pinned by tag.
  - repo: local
    hooks:
      - id: renovate-config-validator
        name: renovate-config-validator
        entry: npx --yes --package renovate@41 renovate-config-validator
        language: system
        files: '^(default|renovate)\.json$'
        pass_filenames: true
